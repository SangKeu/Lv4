<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초보의 장난감</title>
    <style>
        /* 다크 모드 및 기본 배경 */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* 어두운 배경 */
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 메인 컨테이너 */
        .container {
            width: 90%;
            max-width: 400px;
            background-color: #1e1e1e; /* 약간 더 밝은 회색 섹션 */
            padding: 40px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* 메뉴 리스트 */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 버튼 디자인 (다크 모드용) */
        .menu-item {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            background-color: #2c2c2c;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .menu-item:hover {
            background-color: #3d3d3d;
        }

        .menu-item:active {
            transform: scale(0.97);
            background-color: #444444;
        }

        /* 하단 텍스트 */
        .footer-info {
            margin-top: 25px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎮 초보의 장난감</h1>
        
        <div class="menu-list">
            <button class="menu-item" onclick="moveTo('통합플래너')">📅 통합 플래너</button>
            <button class="menu-item" onclick="moveTo('어빌리티')">✨ 어빌리티</button>
            <button class="menu-item" onclick="moveTo('혼돈의주문서계산기')">📜 혼돈의 주문서 계산기</button>
            <button class="menu-item" onclick="moveTo('스타포스')">⭐ 스타포스</button>
            <button class="menu-item" onclick="moveTo('일일보스')">😈 일일 보스</button>
            <button class="menu-item" onclick="moveTo('타수계산기')">⚔️ 타수 계산기</button>
            <button class="menu-item" onclick="moveTo('스탯효율계산기')">📊 스탯 효율 계산기</button>
        </div>

        <div class="footer-info">전용 암호로 보호되고 있습니다.</div>
    </div>

    <script>
        // 설정하신 공통 비밀번호
        const SECRET_KEY = "510423";

        function moveTo(pageName) {
            // 브라우저 팝업창으로 비밀번호 입력받기
            const userInput = prompt("접속 암호를 입력해 주세요.");

            if (userInput === null) return; // '취소'를 눌렀을 때

            if (userInput === SECRET_KEY) {
                // 성공 시 해당 .html 파일로 이동
                location.href = pageName + ".html";
            } else {
                alert("암호가 올바르지 않습니다.");
            }
        }
    </script>

</body>
</html>
