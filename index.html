    <style>
        :root {
            --primary-color: #ff7675;
            --bg-color: #f9f9fb;
        }
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #2d3436;
        }
        .container {
            width: 90%;
            max-width: 400px;

            padding: 30px;

            color: var(--primary-color);

            justify-content: center;

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .menu-item {
            margin-bottom: 12px;
        }
        .menu-item a {
            display: block;
            padding: 15px;
            text-decoration: none;
            color: #636e72;
            background: #f1f2f6;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .menu-item a:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 118, 117, 0.3);
        }
        .emoji {
