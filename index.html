<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초보의 장난감</title>
    <style>
        /* 다크 모드 및 레이아웃 */
        body {
            margin: 0; padding: 0;
            background-color: #121212; color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        /* [1] 메인 접속 화면 */
        #auth-screen {
            display: block; /* 초기 상태 */
            text-align: center; background: #1e1e1e; padding: 40px 30px;
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%; max-width: 350px;
        }

        #auth-screen h2 { margin-top: 0; color: #fff; font-size: 20px; }

        input[type="password"] {
            width: 85%; padding: 15px; margin: 20px 0;
            border: none; border-radius: 12px; background: #333;
            color: #fff; font-size: 18px; text-align: center; outline: none;
        }

        .login-btn {
            width: 95%; padding: 15px; border: none; border-radius: 12px;
            background: #ff7675; color: white; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        /* [2] 메인 앱 화면 */
        #main-app {
            display: none; /* 초기에는 숨김 */
            width: 90%; max-width: 400px; padding: 20px;
        }

        .container {
            background-color: #1e1e1e; padding: 30px 20px;
            border-radius: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding: 0 5px;
        }

        .logout-btn {
            background: #333; border: none; color: #888; 
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
        }

        h1 { font-size: 22px; color: #fff; margin-bottom: 25px; margin-top: 0; }

        .menu-list { display: flex; flex-direction: column; gap: 12px; }

        .menu-item {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            background-color: #2c2c2c; color: #ffffff; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; /* 링크 스타일 제거 */
        }

        /* 강조 스타일 (통합 플래너) */
        .highlight {
            background-color: #383838;
            border: 1px solid #4a90e2;
        }

        .menu-item:active { transform: scale(0.97); background-color: #3d3d3d; }

        .footer-info { margin-top: 25px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2>🔒 관리자 접속</h2>
        <input type="password" id="main-pw-input" placeholder="통합 암호 입력" autofocus>
        <button class="login-btn" onclick="checkMainAuth()">확인</button>
    </div>

    <div id="main-app">
        <div class="container">
            <div class="top-bar">
                <button class="logout-btn" onclick="logout()">접속 종료</button>
                <span style="font-size: 11px; color: #4a90e2;">인증 유지 중 ●</span>
            </div>

            <h1>🎮 초보의 장난감</h1>
            
            <div class="menu-list">
                <button class="menu-item highlight" onclick="location.href='통합플래너.html'">📅 통합 플래너</button>

                <button class="menu-item" onclick="checkSubAuth('혼돈의주문서계산기', '0620')">📜 혼돈의 주문서 계산기</button>
                <button class="menu-item" onclick="checkSubAuth('스타포스', '0620')">⭐ 스타포스</button>
                
                <button class="menu-item" onclick="checkSubAuth('어빌리티', '0527')">✨ 어빌리티</button>
                <button class="menu-item" onclick="checkSubAuth('타수계산기', '0527')">⚔️ 타수 계산기</button>
                <button class="menu-item" onclick="checkSubAuth('스탯효율계산기', '0527')">📊 스탯 효율 계산기</button>
                
                <button class="menu-item" onclick="location.href='일일보스.html'">😈 일일 보스</button>
            </div>

            <div class="footer-info">보안 접속 모드 활성화 중</div>
        </div>
    </div>

    <script>
        // 페이지 로드 시 실행: 기존 인증 기록이 있는지 확인
        window.onload = function() {
            if (sessionStorage.getItem("isMainAuth") === "true") {
                showMainApp();
            }
        };

        // 메인 화면 보여주기 함수
        function showMainApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }

        // 1. 메인 통합 인증
        function checkMainAuth() {
            const input = document.getElementById('main-pw-input').value;
            const mainKey = "369369"; // 설정하신 비밀번호

            if (input === mainKey) {
                // 세션 스토리지에 인증 정보 저장 (브라우저 탭 닫기 전까지 유지)
                sessionStorage.setItem("isMainAuth", "true");
                showMainApp();
            } else {
                alert("통합 암호가 틀렸습니다.");
                document.getElementById('main-pw-input').value = "";
            }
        }

        // 로그아웃 기능 (다시 암호창을 보고 싶을 때)
        function logout() {
            if(confirm("인증 정보를 삭제하고 종료할까요?")) {
                sessionStorage.removeItem("isMainAuth");
                location.reload();
            }
        }

        // 2. 메뉴별 개별 인증
        function checkSubAuth(fileName, correctPw) {
            const userInput = prompt(fileName + " 접속 암호를 입력하세요.");

            if (userInput === null) return; 

            if (userInput === correctPw) {
                location.href = fileName + ".html";
            } else {
                alert("개별 암호가 올바르지 않습니다.");
            }
        }

        // 엔터키 지원
        document.getElementById('main-pw-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkMainAuth();
        });
    </script>

</body>
</html>
