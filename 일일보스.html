<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메이플 일일 보스 리스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        .grade-rare { color: #0070ff; font-weight: bold; }
        .grade-epic { color: #a330c9; font-weight: bold; }
        .grade-unique { color: #ff8000; font-weight: bold; }
        .grade-legendary { color: #1eff00; font-weight: bold; }
        .grade-myth { color: #e6cc80; font-weight: bold; }
        .grade-transcend { color: #ff4e50; font-weight: bold; }
        .grade-immortal { color: #7b1fa2; font-weight: bold; }
        .grade-dominate { color: #c62828; font-weight: bold; }
        .grade-absolute { color: #00838f; font-weight: bold; }
        .grade-heaven { color: #fbc02d; font-weight: bold; }
        .grade-relic { color: #b71c1c; font-weight: bold; }
        
        .label-badge {
            font-size: 0.7rem;
            padding: 1px 4px;
            border-radius: 4px;
            background-color: #f3f4f6;
            color: #6b7280;
            margin-right: 4px;
            border: 1px solid #e5e7eb;
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <!-- 캐릭터 대시보드 영역 -->
    <div class="max-w-4xl mx-auto mb-6 p-5 bg-white rounded-xl shadow-sm border border-gray-100">
        <h1 class="text-xl font-bold text-gray-800 mb-1">캐릭터 대시보드</h1>
        <p class="text-sm text-gray-500">일일 보스 단계별 상세 현황 (세로 최적화 버전)</p>
    </div>

    <!-- 일일 보스 섹션 -->
    <div class="max-w-4xl mx-auto p-4 bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="flex flex-col mb-4">
            <div class="flex items-center mb-1">
                <div class="w-1.5 h-6 bg-blue-600 rounded-full mr-2"></div>
                <h2 class="text-lg font-bold text-gray-800">보스 리스트</h2>
            </div>
            <!-- 안내 문구 추가 -->
            <p class="text-xs text-blue-500 ml-3.5 font-medium italic">※ 표기된 등급은 어빌리티 상세수치입니다.</p>
        </div>

        <div class="overflow-hidden">
            <table class="w-full border-collapse">
                <tbody class="divide-y divide-gray-200">
                    <script>
                        const bosses = [
                            { step: 1, name: "킹 슬라임", item: "물컹물컹한 신발", grade: "고급10", effect: "공 3%", inc: "0.1%", cls: "" },
                            { step: 2, name: "알리샤르", item: "이카루스의 망토", grade: "레어5", effect: "공 4%", inc: "0.12%", cls: "grade-rare" },
                            { step: 3, name: "자쿰", item: "자쿰의 투구", grade: "레어10", effect: "공 5%", inc: "0.14%", cls: "grade-rare" },
                            { step: 4, name: "픽시맘", item: "여신의 팔찌", grade: "에픽5", effect: "공 6%", inc: "0.16%", cls: "grade-epic" },
                            { step: 5, name: "마왕 발록", item: "털가죽 신발", grade: "에픽10", effect: "공 7%", inc: "0.18%", cls: "grade-epic" },
                            { step: 6, name: "반 레온", item: "반 레온의 소울", grade: "유니크5", effect: "공 8%", inc: "0.2%", cls: "grade-unique" },
                            { step: 7, name: "파풀라투스", item: "파풀라투스 인형", grade: "유니크10", effect: "공 9%", inc: "0.22%", cls: "grade-unique" },
                            { step: 8, name: "벨룸", item: "벨룸의 투구", grade: "레전드리5", effect: "공 10%", inc: "0.24%", cls: "grade-legendary" },
                            { step: 9, name: "카웅", item: "카웅 큐브", grade: "레전드리10", effect: "공 11%", inc: "0.26%", cls: "grade-legendary" },
                            { step: 10, name: "피아누스", item: "피아누스의 소울", grade: "유물5", effect: "공 12%", inc: "0.28%", cls: "grade-relic" },
                            { step: 11, name: "블러드퀸", item: "블러드퀸 화장대", grade: "유물10", effect: "공 13%", inc: "0.3%", cls: "grade-relic" },
                            { step: 12, name: "반반", item: "반반 투구", grade: "신화5", effect: "공 14%", inc: "0.32%", cls: "grade-myth" },
                            { step: 13, name: "피에르", item: "피에르의 인형", grade: "신화10", effect: "공 15%", inc: "0.34%", cls: "grade-myth" },
                            { step: 14, name: "매그너스", item: "매그너스의 증표", grade: "초월5", effect: "공 16%", inc: "0.36%", cls: "grade-transcend" },
                            { step: 15, name: "힐라", item: "다크 소울", grade: "초월10", effect: "공 17%", inc: "0.38%", cls: "grade-transcend" },
                            { step: 16, name: "아카이럼", item: "도미네이터 팬던트", grade: "불멸5", effect: "공 18%", inc: "0.4%", cls: "grade-immortal" },
                            { step: 17, name: "스우", item: "스우의 정령", grade: "불멸10", effect: "공 19%", inc: "0.43%", cls: "grade-immortal" },
                            { step: 18, name: "윌", item: "윌의 마크", grade: "지배5", effect: "공 20%", inc: "0.46%", cls: "grade-dominate" },
                            { step: 19, name: "시그너스", item: "시그너스 엠블럼", grade: "지배10", effect: "공 21%", inc: "0.49%", cls: "grade-dominate" },
                            { step: 20, name: "세렌", item: "신성검 아소르", grade: "절대5", effect: "공 22%", inc: "0.52%", cls: "grade-absolute" },
                            { step: 21, name: "가디언 엔젤 슬라임", item: "가디언 엔젤 링", grade: "절대10", effect: "공 23%", inc: "0.56%", cls: "grade-absolute" },
                            { step: 22, name: "거대골렘", item: "글로리온 황금 문장", grade: "천상5", effect: "공 24%", inc: "0.60%", cls: "grade-heaven" },
                            { step: 23, name: "풍신령", item: "풍신령의 혼", grade: "천상10", effect: "공 25%", inc: "0.64%", cls: "grade-heaven" },
                            { step: 24, name: "듄켈", item: "커맨더 포스 이어링", grade: "X", effect: "공 26%", inc: "0.68%", cls: "text-gray-400 font-bold" },
                            { step: 25, name: "검은마법사", item: "창세의 뱃지", grade: "X", effect: "공 27%", inc: "0.72%", cls: "text-gray-400 font-bold" }
                        ];

                        bosses.forEach(b => {
                            document.write(`
                                <tr class="hover:bg-gray-50 transition-colors">
                                    <td class="py-3 px-2 w-10 text-center align-top pt-4">
                                        <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-gray-100 text-xs font-bold text-gray-500">${b.step}</span>
                                    </td>
                                    <td class="py-3 px-2">
                                        <div class="flex flex-col gap-1">
                                            <div class="flex items-center flex-wrap gap-x-2">
                                                <span class="font-bold text-gray-900">${b.name}</span>
                                                <span class="text-xs text-gray-500">| ${b.item}</span>
                                            </div>
                                            <div class="flex items-center flex-wrap gap-x-3 gap-y-1 mt-1">
                                                <div class="flex items-center">
                                                    <span class="label-badge">등급</span>
                                                    <span class="${b.cls} text-xs">${b.grade}</span>
                                                </div>
                                                <div class="flex items-center border-l pl-3 border-gray-200">
                                                    <span class="label-badge">효과</span>
                                                    <span class="text-xs text-gray-700 font-medium">${b.effect}</span>
                                                </div>
                                                <div class="flex items-center border-l pl-3 border-gray-200">
                                                    <span class="label-badge">증가</span>
                                                    <span class="text-xs text-red-500 font-bold">${b.inc}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            `);
                        });
                    </script>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
