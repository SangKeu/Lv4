<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주문서 효율 계산기 - 레벨업만이 살길</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        .scroll-card { 
            border-radius: 1.5rem; 
            background: white; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .chaos-input {
            width: 100%;
            padding: 12px 8px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            transition: all 0.2s;
            color: #0f172a;
        }

        .chaos-input:focus {
            outline: none;
            border-color: #f97316;
            background-color: #fff7ed;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
        }

        .chaos-input:disabled {
            background-color: #f8fafc;
            color: #cbd5e1;
            cursor: not-allowed;
            border-color: #f1f5f9;
        }

        .tab-active {
            color: #f97316;
            border-bottom: 4px solid #f97316;
            background-color: #fffaf5;
        }
        
        .tab-active-normal {
            color: #2563eb;
            border-bottom: 4px solid #2563eb;
            background-color: #eff6ff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        input::-webkit-inner-spin-button,
        input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .stat-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-4xl mx-auto">
    <header class="text-center mb-10">
        <h1 class="text-3xl font-black text-slate-800 flex items-center justify-center gap-3">
            <span class="text-4xl drop-shadow-sm">📜</span> 주문서 효율 계산기
        </h1>
        <div class="inline-block px-4 py-1 mt-3 rounded-full bg-slate-200 text-slate-600 text-[10px] font-black uppercase tracking-[0.2em]">
            Chaos Scroll Efficiency Professional
        </div>
    </header>

    <div class="scroll-card">
        <!-- Mode Tabs -->
        <div class="flex border-b-2 border-slate-100">
            <button onclick="switchChaosMode('awakening')" id="tab-awakening" class="flex-1 py-5 text-lg font-black transition-all tab-active">
                ✨ 초월 지역
            </button>
            <button onclick="switchChaosMode('normal')" id="tab-normal" class="flex-1 py-5 text-lg font-black text-slate-400 transition-all">
                🌿 일반 지역
            </button>
        </div>

        <!-- Info Header -->
        <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="flex h-2 w-2 rounded-full bg-blue-500 animate-pulse"></span>
                <p class="text-xs font-bold text-slate-600">현재 공격력을 입력하면 효율이 자동 계산됩니다.</p>
            </div>
            <button onclick="resetAll()" class="px-3 py-1 rounded-lg bg-red-50 text-[11px] font-black text-red-500 hover:bg-red-100 transition-colors">전체 초기화</button>
        </div>

        <!-- Table Container -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50/80">
                    <tr class="text-[12px] text-slate-400 font-black uppercase">
                        <th class="px-6 py-4 text-center">지역 정보</th>
                        <th class="px-4 py-4 text-center w-32">기본 / 최대</th>
                        <th class="px-4 py-4 text-center w-40">현재 수치 입력</th>
                        <th class="px-6 py-4 text-center">달성 효율 (%)</th>
                    </tr>
                </thead>
                <tbody id="chaosTable" class="text-sm divide-y divide-slate-100">
                    <!-- Rows injected via JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Legend -->
        <div class="p-8 bg-slate-900 text-white">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 border border-white/10">
                    <div class="w-10 h-10 rounded-full bg-orange-500/20 flex items-center justify-center text-orange-400 text-xl font-black">!</div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold">90% 이상</p>
                        <p class="text-orange-400 font-black text-lg">졸업급 옵션</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 border border-white/10">
                    <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 text-xl font-black">✓</div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold">50% 이상</p>
                        <p class="text-blue-400 font-black text-lg">유효 옵션</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 border border-white/10">
                    <div class="w-10 h-10 rounded-full bg-slate-500/20 flex items-center justify-center text-slate-400 text-xl font-black">?</div>
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold">기본 미달</p>
                        <p class="text-slate-300 font-black text-lg">0% 처리</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-10 text-center space-y-2">
        <p class="text-xs text-slate-400 font-bold">© 2024 주문서 효율 계산기</p>
        <p class="text-[11px] text-slate-400 font-medium italic">"수정이 필요한 데이터는 개발자(초보)에게 알려주세요."</p>
    </footer>
</div>

<script>
    const CHAOS_DATA = {
        awakening: [
            { region: "리스항구", base: 1500, max: 3890 },
            { region: "헤네시스", base: 1875, max: 4863 },
            { region: "엘리니아", base: 2250, max: 5835 },
            { region: "커닝시티", base: 2625, max: 6808 },
            { region: "페리온", base: 630, max: 1634, disabled: true },
            { region: "슬리피우드", base: 3075, max: 7975 },
            { region: "골드비치", base: 3300, max: 8559 },
            { region: "커닝스퀘어", base: 795, max: 2062, disabled: true },
            { region: "무릉도원", base: 870, max: 2256, disabled: true },
            { region: "황금사원", base: 945, max: 2451, disabled: true }
        ],
        normal: [
            { region: "폐광", base: 450, max: 1167 },
            { region: "지구방위본부", base: 495, max: 1283 },
            { region: "미나르숲", base: 540, max: 1400 },
            { region: "미나르계곡", base: 585, max: 1517 },
            { region: "협곡", base: 630, max: 1634 },
            { region: "아랫마을", base: 670, max: 1737 },
            { region: "니할사막", base: 720, max: 1867 },
            { region: "마가티아", base: 795, max: 2062 },
            { region: "무릉도원", base: 870, max: 2256 },
            { region: "황금사원", base: 945, max: 2451 },
            { region: "테마파크", base: 1020, max: 2645 },
            { region: "사자왕의성", base: 1110, max: 2879 },
            { region: "콜로서스", base: 1200, max: 3112 },
            { region: "신전", base: 1290, max: 3345 },
            { region: "레헬른", base: 1425, max: 3696 },
            { region: "츄츄아일랜드", base: 1575, max: 4085 },
            { region: "미래의문", base: 1725, max: 4474 },
            { region: "소멸의여로", base: 1875, max: 4863 },
            { region: "아르카나", base: 2100, max: 5446 },
            { region: "모라스", base: 2325, max: 6030 },
            { region: "에스페라", base: 2550, max: 6614 },
            { region: "문브릿지", base: 2775, max: 7197 },
            { region: "고통의미궁", base: 3000, max: 7781 },
            { region: "리멘", base: 3300, max: 8559 }
        ]
    };

    let currentMode = 'awakening';

    function switchChaosMode(mode) {
        currentMode = mode;
        
        const tabAwake = document.getElementById('tab-awakening');
        const tabNormal = document.getElementById('tab-normal');
        
        if (mode === 'awakening') {
            tabAwake.className = "flex-1 py-5 text-lg font-black transition-all tab-active";
            tabNormal.className = "flex-1 py-5 text-lg font-black text-slate-400 transition-all";
        } else {
            tabNormal.className = "flex-1 py-5 text-lg font-black transition-all tab-active-normal";
            tabAwake.className = "flex-1 py-5 text-lg font-black text-slate-400 transition-all";
        }
        
        renderTable();
    }

    function renderTable() {
        const data = CHAOS_DATA[currentMode];
        const tbody = document.getElementById('chaosTable');
        tbody.innerHTML = '';

        data.forEach((item, idx) => {
            const isDisabled = !!item.disabled;
            const row = document.createElement('tr');
            row.className = "animate-fade hover:bg-slate-50/50 transition-colors";
            if (isDisabled) row.className += " opacity-40 grayscale bg-slate-50";

            row.innerHTML = `
                <td class="px-6 py-5">
                    <div class="font-black text-slate-800 text-base mb-1">${item.region}</div>
                    <div class="flex gap-2">
                        <span class="stat-badge bg-slate-100 text-slate-500">Lv. Area</span>
                    </div>
                </td>
                <td class="px-4 py-5 text-center">
                    <div class="flex flex-col items-center gap-1">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Base / Max</span>
                        <div class="bg-slate-100 rounded-lg px-2 py-1 w-full max-w-[100px]">
                            <div class="text-[13px] font-black text-blue-600 border-b border-slate-200 pb-0.5 mb-0.5">${isDisabled ? '-' : item.base.toLocaleString()}</div>
                            <div class="text-[13px] font-black text-slate-400">${isDisabled ? '-' : item.max.toLocaleString()}</div>
                        </div>
                    </div>
                </td>
                <td class="px-4 py-5 text-center">
                    <input type="number" 
                           id="input-${idx}" 
                           class="chaos-input" 
                           placeholder="${isDisabled ? '미구현' : '입력'}" 
                           ${isDisabled ? 'disabled' : ''} 
                           oninput="calculateEfficiency(${idx}, ${item.base}, ${item.max})">
                </td>
                <td class="px-6 py-5 text-center">
                    <div class="flex flex-col items-center">
                        <span id="res-${idx}" class="text-2xl font-black ${isDisabled ? 'text-slate-300' : 'text-slate-200'} transition-all duration-300">0%</span>
                        <div id="bar-bg-${idx}" class="w-16 h-1.5 bg-slate-100 rounded-full mt-2 overflow-hidden ${isDisabled ? 'hidden' : ''}">
                            <div id="bar-fill-${idx}" class="h-full bg-slate-300 w-0 transition-all duration-500"></div>
                        </div>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function calculateEfficiency(idx, base, max) {
        const inputEl = document.getElementById(`input-${idx}`);
        const resEl = document.getElementById(`res-${idx}`);
        const barFill = document.getElementById(`bar-fill-${idx}`);
        const val = parseInt(inputEl.value) || 0;

        if (val < base) {
            resEl.innerText = "0%";
            resEl.className = "text-2xl font-black text-slate-300";
            barFill.style.width = "0%";
            barFill.className = "h-full bg-slate-300 transition-all";
            return;
        }

        const efficiency = Math.min(100, ((val - base) / (max - base)) * 100);
        const displayVal = Math.floor(efficiency);
        resEl.innerText = displayVal + "%";
        barFill.style.width = efficiency + "%";

        if (efficiency >= 90) {
            resEl.className = "text-2xl font-black text-orange-500 scale-110 drop-shadow-sm";
            barFill.className = "h-full bg-orange-500 transition-all";
        } else if (efficiency >= 50) {
            resEl.className = "text-2xl font-black text-blue-600";
            barFill.className = "h-full bg-blue-500 transition-all";
        } else {
            resEl.className = "text-2xl font-black text-slate-600";
            barFill.className = "h-full bg-slate-400 transition-all";
        }
    }

    function resetAll() {
        // 커스텀 모달 대신 사용되는 기존 confirm 유지
        if(confirm("모든 입력값을 초기화하시겠습니까?")) {
            renderTable();
        }
    }

    window.onload = renderTable;
</script>

</body>
</html>
